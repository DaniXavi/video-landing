<!DOCTYPE html>
<html>
<head>
  <title>My Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>

<body>

  <div class="video-container">
    <iframe
      src="https://play.gumlet.io/embed/6989db18873071aec5b9607a?background=false&autoplay=false&loop=false&disable_player_controls=false"
      allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture; fullscreen; clipboard-write"
      allowfullscreen>
    </iframe>
  </div>

</body>
</html>
